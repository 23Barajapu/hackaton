<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peringatan Dini Gagal Panen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result-container {
            display: none;
        }

        .alert-box {
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .alert-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .alert-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .alert-box h2 {
            font-size: 2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .probability-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: bold;
            margin-left: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .info-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .info-card ul {
            list-style: none;
            padding: 0;
        }

        .info-card li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            line-height: 1.6;
        }

        .info-card li:last-child {
            border-bottom: none;
        }

        .forecast-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .forecast-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .forecast-card h4 {
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .forecast-card p {
            margin: 8px 0;
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f5576c;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 Sistem Peringatan Dini Gagal Panen</h1>
            <p>Prediksi dan Rekomendasi untuk Lahan Padi Anda</p>
        </div>

        <div class="search-box">
            <form class="search-form" id="predictionForm">
                <div class="form-group">
                    <label for="region">Pilih Wilayah:</label>
                    <select id="region" name="region" required>
                        <option value="">Memuat wilayah...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="startDate">Tanggal Mulai (Opsional):</label>
                    <input type="date" id="startDate" name="startDate">
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button type="submit" class="btn">🔍 Prediksi Sekarang</button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Memproses prediksi...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-container" id="resultContainer">
            <div class="alert-box" id="alertBox">
                <h2 id="alertTitle">
                    <span id="alertIcon">⚠️</span>
                    <span id="alertText">Status Prediksi</span>
                    <span class="probability-badge" id="probabilityBadge">0%</span>
                </h2>
                <p id="alertDescription">Deskripsi status prediksi akan muncul di sini.</p>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <h3>📋 Alasan Prediksi</h3>
                    <ul id="reasonsList"></ul>
                </div>

                <div class="info-card">
                    <h3>💡 Rekomendasi Mitigasi & Perawatan</h3>
                    <ul id="mitigationList"></ul>
                </div>
            </div>

            <div class="forecast-section">
                <h3>🌤️ Prediksi Cuaca 3 Bulan Ke Depan</h3>
                <div class="forecast-grid" id="forecastGrid"></div>
                <p style="margin-top: 20px; color: #666; font-style: italic;" id="forecastNote"></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8001';

        // Load regions on page load
        async function loadRegions() {
            try {
                const response = await fetch(`${API_BASE_URL}/regions`);
                const data = await response.json();
                
                const regionSelect = document.getElementById('region');
                regionSelect.innerHTML = '<option value="">Pilih Wilayah...</option>';
                
                data.regions.forEach(region => {
                    const option = document.createElement('option');
                    option.value = region;
                    option.textContent = region;
                    regionSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading regions:', error);
                document.getElementById('region').innerHTML = '<option value="">Error memuat wilayah</option>';
            }
        }

        // Handle form submission
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const region = document.getElementById('region').value;
            const startDate = document.getElementById('startDate').value;
            
            if (!region) {
                alert('Silakan pilih wilayah terlebih dahulu');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';

            try {
                const requestBody = {
                    region: region,
                    use_csv: true
                };
                
                if (startDate) {
                    requestBody.start_date = startDate;
                }

                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'Error melakukan prediksi');
                }

                displayResult(result);
            } catch (error) {
                document.getElementById('errorMessage').textContent = `Error: ${error.message}`;
                document.getElementById('errorMessage').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        function displayResult(result) {
            // Update alert box
            const alertBox = document.getElementById('alertBox');
            const alertTitle = document.getElementById('alertText');
            const alertIcon = document.getElementById('alertIcon');
            const probabilityBadge = document.getElementById('probabilityBadge');
            const alertDescription = document.getElementById('alertDescription');

            const probability = (result.probability * 100).toFixed(2);
            probabilityBadge.textContent = `${probability}%`;

            if (result.prediction === 'Gagal Panen' || result.risk_level === 'Tinggi') {
                alertBox.className = 'alert-box alert-danger';
                alertIcon.textContent = '🚨';
                alertTitle.textContent = 'RISIKO GAGAL PANEN TINGGI';
                alertDescription.textContent = `Wilayah ${result.region} memiliki risiko gagal panen ${result.risk_level.toLowerCase()} dengan probabilitas ${probability}%. Tindakan segera diperlukan!`;
            } else if (result.risk_level === 'Sedang') {
                alertBox.className = 'alert-box alert-warning';
                alertIcon.textContent = '⚠️';
                alertTitle.textContent = 'PERHATIAN: Risiko Sedang';
                alertDescription.textContent = `Wilayah ${result.region} memiliki risiko gagal panen ${result.risk_level.toLowerCase()} dengan probabilitas ${probability}%. Perhatian khusus diperlukan.`;
            } else {
                alertBox.className = 'alert-box alert-success';
                alertIcon.textContent = '✅';
                alertTitle.textContent = 'KONDISI NORMAL';
                alertDescription.textContent = `Wilayah ${result.region} memiliki risiko gagal panen ${result.risk_level.toLowerCase()} dengan probabilitas ${probability}%. Kondisi lahan dalam keadaan baik.`;
            }

            // Update reasons
            const reasonsList = document.getElementById('reasonsList');
            reasonsList.innerHTML = '';
            if (result.reasons && result.reasons.length > 0) {
                result.reasons.forEach(reason => {
                    const li = document.createElement('li');
                    li.textContent = reason;
                    reasonsList.appendChild(li);
                });
            } else {
                const li = document.createElement('li');
                li.textContent = 'Tidak ada informasi tambahan';
                reasonsList.appendChild(li);
            }

            // Update mitigation
            const mitigationList = document.getElementById('mitigationList');
            mitigationList.innerHTML = '';
            if (result.mitigation_recommendations && result.mitigation_recommendations.length > 0) {
                result.mitigation_recommendations.forEach(rec => {
                    const li = document.createElement('li');
                    li.innerHTML = rec;
                    mitigationList.appendChild(li);
                });
            } else {
                const li = document.createElement('li');
                li.textContent = 'Tidak ada rekomendasi khusus';
                mitigationList.appendChild(li);
            }

            // Update weather forecast
            const forecastGrid = document.getElementById('forecastGrid');
            const forecastNote = document.getElementById('forecastNote');
            forecastGrid.innerHTML = '';

            if (result.weather_forecast && result.weather_forecast.forecast) {
                result.weather_forecast.forecast.forEach(month => {
                    const card = document.createElement('div');
                    card.className = 'forecast-card';
                    
                    let eventsHtml = '';
                    if (Object.keys(month.cuaca_ekstrem).length > 0) {
                        eventsHtml = '<p><strong>Cuaca Ekstrem:</strong></p><ul style="list-style: none; padding-left: 0;">';
                        for (const [event, count] of Object.entries(month.cuaca_ekstrem)) {
                            eventsHtml += `<li>• ${event}: ${count} kejadian</li>`;
                        }
                        eventsHtml += '</ul>';
                    } else {
                        eventsHtml = '<p>Tidak ada prediksi cuaca ekstrem</p>';
                    }

                    card.innerHTML = `
                        <h4>${month.nama_bulan}</h4>
                        <p><strong>Prediksi Kejadian:</strong> ${month.prediksi_kejadian}</p>
                        ${eventsHtml}
                        <p style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;">${month.catatan}</p>
                    `;
                    forecastGrid.appendChild(card);
                });

                if (result.weather_forecast.note) {
                    forecastNote.textContent = result.weather_forecast.note;
                }
            } else {
                forecastGrid.innerHTML = '<p>Tidak ada data prediksi cuaca tersedia</p>';
            }

            // Show result container
            document.getElementById('resultContainer').style.display = 'block';
        }

        // Load regions when page loads
        loadRegions();
    </script>
</body>
</html>
